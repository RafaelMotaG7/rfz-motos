<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFZ</title>
    <link rel="stylesheet" href="estilos/style.css" media="all">
    <link rel="stylesheet" href="estilos/media.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>
<body>
    <header>
        <h1>RFZ</h1>
        <div class="icons">
            <i class="material-symbols-outlined">menu</i>
            <i class="material-symbols-outlined">search</i>
            <i class="material-symbols-outlined">account_circle</i>
        </div>
    </header>
    <main>
        <section>
            <picture>
                <source media="(min-width: 1000px)" srcset="images/moto-preta-vermelha-pexels-deitada.jpg" type="image/jpeg">
                <img src="images/moto-preta-vermelha-pexels.jpg" alt="Uma pessoa dirigindo uma moto em uma curva, a moto é predominantemente preta com detalhes vermelha">
            </picture>
            <p>RFZ Motos<br>Acelerando seu destino</p>
            <button>Veja as novidades</button>
        </section>
        <article>
            <h2>Moto mais vendida</h2>
            <div class="motos">
                <img src="images/Moto-azul-pexels.jpg" alt="Moto azul BMW S1000 RR">
                <p>BMW S1000 RR</p>
                <p><strong>R$139.900,00</strong></p>
                <hr>
            </div>
            <h2>Categoria Popular</h2>
            <div class="motos">
                <img src="images/moto-preta-pexels.jpg" alt="">
                <p>BMW S1000 RR</p>
                <p><strong>R$139.900,00</strong></p>
            </div>
        </article>
    </main>
</body>
</html>
